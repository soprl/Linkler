<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kurumsal Yönlendirme Sayfası</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #0b1f4d 0%, #123a7a 55%, #ffffff 100%);
        color: #0b1f4d;
        display: flex;
        flex-direction: column;
      }

      .logo-area {
        position: absolute;
        top: 16px;
        left: 16px;
        width: 140px;
        height: auto;
      }

      .logo-area img {
        width: 100%;
        height: auto;
        display: block;
      }

      .wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 100px 20px 40px;
      }

      .card {
        width: 100%;
        max-width: 480px;
        background: rgba(255, 255, 255, 0.96);
        border-radius: 24px;
        padding: 36px 28px;
        box-shadow: 0 20px 60px rgba(7, 24, 61, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.45);
        text-align: center;
      }

      .card h1 {
        font-size: 28px;
        margin-bottom: 10px;
        color: #0b1f4d;
      }

      .card p {
        font-size: 15px;
        line-height: 1.6;
        color: #4d5f84;
        margin-bottom: 28px;
      }

      .buttons {
        display: grid;
        gap: 14px;
      }

      .buttons a {
        text-decoration: none;
        background: linear-gradient(135deg, #0b1f4d, #174a95);
        color: #ffffff;
        padding: 16px 18px;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.3px;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        box-shadow: 0 10px 24px rgba(11, 31, 77, 0.22);
        position: relative;
        overflow: hidden;
        z-index: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
      }

      .buttons a::before {
        content: "";
        width: 0; /* ikon aktif değilken yer kaplamasın */
        height: 22px;
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        opacity: 0; /* sadece hover/aktif olunca görünsün */
        transform: scale(0.92);
        transition: opacity 0.2s ease, transform 0.2s ease;
        margin-right: 0;
        flex-shrink: 0;
      }

      .buttons a.facebook::before {
        background-image: url("facebook.png");
      }

      .buttons a.linkedin::before {
        background-image: url("link.png");
      }

      .buttons a.instagram::before {
        background-image: url("instagram.png");
      }

      .buttons a.google::before {
        background-image: url("google.png");
      }

      .buttons a:hover::before,
      .buttons a:focus-visible::before,
      .buttons a:active::before {
        opacity: 0; /* ikonsuz butonlarda yer kayması olmasın */
        width: 0;
        transform: scale(0.92);
        margin-right: 0;
      }

      .buttons a.facebook:hover::before,
      .buttons a.facebook:focus-visible::before,
      .buttons a.facebook:active::before {
        opacity: 0.95;
        width: 22px;
        transform: scale(1);
        margin-right: 12px;
      }

      .buttons a.linkedin:hover::before,
      .buttons a.linkedin:focus-visible::before,
      .buttons a.linkedin:active::before {
        opacity: 0.95;
        width: 22px;
        transform: scale(1);
        margin-right: 12px;
      }

      .buttons a.instagram:hover::before,
      .buttons a.instagram:focus-visible::before,
      .buttons a.instagram:active::before {
        opacity: 0.95;
        width: 22px;
        transform: scale(1);
        margin-right: 12px;
      }

      .buttons a.google:hover::before,
      .buttons a.google:focus-visible::before,
      .buttons a.google:active::before {
        opacity: 0.95;
        width: 22px;
        transform: scale(1);
        margin-right: 12px;
      }

      .buttons a:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(11, 31, 77, 0.3);
        background: linear-gradient(135deg, #123a7a, #0b1f4d);
      }

      .buttons a.facebook:hover,
      .buttons a.facebook:focus-visible {
        background: #1877f2;
        box-shadow: 0 14px 28px rgba(24, 119, 242, 0.35);
      }

      .buttons a.linkedin:hover,
      .buttons a.linkedin:focus-visible {
        background: #0a66c2;
        box-shadow: 0 14px 28px rgba(10, 102, 194, 0.35);
      }

      .buttons a.instagram:hover,
      .buttons a.instagram:focus-visible {
        background: #e1306c;
        box-shadow: 0 14px 28px rgba(225, 48, 108, 0.35);
      }

      .buttons a.google:hover,
      .buttons a.google:focus-visible {
        background: #db4437;
        box-shadow: 0 14px 28px rgba(219, 68, 55, 0.35);
      }

      .buttons a.join {
        background: #e5221f;
        text-shadow: none;
        box-shadow: none;
      }

      .buttons a.join::after {
        content: "";
        position: absolute;
        inset: 0;
        background: none;
        opacity: 0;
        pointer-events: none;
      }

      .buttons a.join:hover,
      .buttons a.join:focus-visible,
      .buttons a.join:active {
        /* Renk değişmesin; sadece büyüsün */
        background: #e5221f;
        transform: scale(1.03);
        box-shadow: none;
      }

      .footer-note {
        margin-top: 22px;
        font-size: 12px;
        color: #6d7c99;
      }

      @media (max-width: 600px) {
        .logo-area {
          top: 12px;
          left: 12px;
          width: 145px;
          height: 54px;
        }

        .card {
          padding: 28px 18px;
          border-radius: 18px;
        }

        .card h1 {
          font-size: 24px;
        }

        .buttons a {
          padding: 15px 16px;
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="logo-area">
      <img src="erpalogo.png" alt="ERPA Logo" />
    </div>

    <div class="wrapper">
      <div class="card">
        <h1>Bize Ulaşın</h1>
        <p>Kurumsal hesaplarımıza ve bağlantılarımıza aşağıdaki butonlardan hızlıca ulaşabilirsiniz.</p>

        <div class="buttons">
          <a class="facebook" href="https://www.facebook.com/p/erpateknoloji-100068405018825/" target="_blank" rel="noopener noreferrer">Facebook</a>
          <a class="linkedin" href="https://www.linkedin.com/company/erpa-teknoloji" target="_blank" rel="noopener noreferrer">LinkedIn</a>
          <a class="instagram" href="https://www.instagram.com/erpa.teknoloji/" target="_blank" rel="noopener noreferrer">Instagram</a>
          <a class="google" href="https://share.google/00NActwhe2pKArfIB" target="_blank" rel="noopener noreferrer">Google Yorumlar</a>
          <a class="join" href="https://docs.google.com/forms/d/1fK5Dn1eebFqX_4Pz_NjS-MSwmHbhYLBLMcEo_IPbqAc/edit" target="_blank" rel="noopener noreferrer">Sende Bize Katıl</a>
        </div>
      </div>
    </div>
  </body>
</html>
